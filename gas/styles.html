<style>
    *, *::before, *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    :root {
        --color-primary: #eab308;
        --color-secondary: #f97316;
        --color-accent: #84cc16;
        --color-base-100: #ffffff;
        --color-base-200: #fefce8;
        --color-base-300: #fef08a;
        --color-base-content: #1c1917;
        --color-amber-50: #fffbeb;
        --color-amber-100: #fef3c7;
        --color-amber-200: #fde68a;
        --color-amber-500: #f59e0b;
        --color-amber-600: #d97706;
        --color-amber-700: #b45309;
        --color-amber-800: #92400e;
        --color-gray-100: #f3f4f6;
        --color-gray-200: #e5e7eb;
        --color-gray-300: #d1d5db;
        --color-gray-400: #9ca3af;
        --color-gray-500: #6b7280;
        --color-gray-600: #4b5563;
        --color-gray-800: #1f2937;
        --color-gray-900: #111827;
    }

    html, body {
        height: 100%;
        margin: 0;
    }

    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        user-select: none;
        overflow: hidden;
        background: var(--color-base-200);
    }

    #app {
        min-height: 100%;
        display: flex;
        align-items: safe center;
        justify-content: center;
        padding: 1rem;
        cursor: pointer;
        overflow-y: auto;
        overflow-x: hidden;
        position: relative;
        background: linear-gradient(to bottom right, var(--color-amber-50), white, #fefce8);
    }

    .settings-btn {
        position: absolute;
        top: 1rem;
        right: 1rem;
        z-index: 10;
        width: 3rem;
        height: 3rem;
        border-radius: 50%;
        border: none;
        background: transparent;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background-color 0.3s;
    }

    .settings-btn:hover {
        background: rgba(0, 0, 0, 0.05);
    }

    .settings-btn svg {
        width: 2.5rem;
        height: 2.5rem;
        color: rgba(28, 25, 23, 0.6);
        transition: color 0.2s;
    }

    .settings-btn:hover svg {
        color: var(--color-primary);
    }

    .start-message {
        text-align: center;
    }

    .start-message h1 {
        font-size: clamp(1.5rem, 4vw, 3rem);
        font-weight: 700;
        margin-bottom: 1.5rem;
        background: linear-gradient(to right, #eab308, #f97316);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    .start-message p {
        font-size: clamp(1.25rem, 2.5vw, 1.875rem);
        color: rgba(28, 25, 23, 0.6);
    }

    @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
    }

    .main-content {
        width: 100%;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.5rem;
    }

    .main-content.active {
        display: flex;
    }

    .clock-display {
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    .clock-time {
        font-weight: 900;
        color: var(--color-base-content);
        font-variant-numeric: tabular-nums;
        line-height: 1;
        filter: drop-shadow(0 1px 1px rgba(0, 0, 0, 0.05));
    }

    .divider {
        width: 100%;
        height: 1px;
        background: linear-gradient(to right, transparent, var(--color-base-300), transparent);
    }

    .schedule-section {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        padding: 0 1rem;
    }

    .schedule-title {
        font-weight: 700;
        color: var(--color-amber-600);
        margin-bottom: 1.5rem;
    }

    .schedule-list {
        width: 100%;
        max-width: 48rem;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
    }

    .schedule-item {
        position: relative;
        display: flex;
        align-items: center;
        border-radius: 1rem;
        transition: all 0.5s ease-out;
    }

    .schedule-item.current {
        background: var(--color-amber-100);
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        height: 7rem;
    }

    .schedule-item.other {
        background: rgba(255, 255, 255, 0.4);
        height: 5rem;
    }

    .accent-bar {
        position: absolute;
        left: 0;
        top: 0.5rem;
        bottom: 0.5rem;
        width: 0.375rem;
        border-radius: 9999px;
    }

    .schedule-item.current .accent-bar {
        background: var(--color-amber-500);
    }

    .schedule-item.other .accent-bar {
        background: var(--color-gray-200);
    }

    .schedule-time {
        width: 9rem;
        padding-left: 1.5rem;
        flex-shrink: 0;
        font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
        font-variant-numeric: tabular-nums;
    }

    .schedule-item.current .schedule-time {
        color: var(--color-amber-700);
        font-weight: 700;
        font-size: 1.875rem;
    }

    .schedule-item.other .schedule-time {
        color: var(--color-gray-400);
        font-size: 1.25rem;
    }

    .schedule-task {
        flex: 1;
        padding: 0 1rem;
        font-weight: 700;
    }

    .schedule-item.current .schedule-task {
        color: var(--color-gray-900);
        font-size: 3rem;
    }

    .schedule-item.other .schedule-task {
        color: var(--color-gray-500);
        font-size: 1.5rem;
    }

    .schedule-end {
        padding-right: 1.5rem;
        font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
        font-variant-numeric: tabular-nums;
    }

    .schedule-item.current .schedule-end {
        color: var(--color-amber-600);
        font-size: 1.5rem;
    }

    .schedule-item.other .schedule-end {
        color: var(--color-gray-300);
        font-size: 1.125rem;
    }

    .loop-indicator {
        position: absolute;
        bottom: -0.75rem;
        left: 50%;
        transform: translateX(-50%);
        color: var(--color-gray-300);
        font-size: 0.875rem;
    }

    .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        align-items: center;
        justify-content: center;
        z-index: 50;
        padding: 1rem;
    }

    .modal-overlay.active {
        display: flex;
    }

    .modal-content {
        background: white;
        border-radius: 1.5rem;
        padding: 2rem;
        width: 100%;
        max-width: 28rem;
        max-height: 90vh;
        overflow-y: auto;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        border: 1px solid var(--color-gray-100);
    }

    .modal-title {
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 2rem;
        color: var(--color-gray-800);
    }

    .modal-section {
        margin-bottom: 2rem;
    }

    .modal-section-title {
        font-size: 0.875rem;
        font-weight: 500;
        color: var(--color-gray-500);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 1rem;
    }

    .minute-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin-bottom: 1rem;
    }

    .minute-tag {
        padding: 0.5rem 1rem;
        background: var(--color-amber-100);
        color: var(--color-amber-800);
        border-radius: 0.75rem;
        font-size: 0.875rem;
        font-weight: 500;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 0.25rem;
        transition: background-color 0.2s;
    }

    .minute-tag:hover {
        background: var(--color-amber-200);
    }

    .minute-tag .remove {
        color: var(--color-amber-600);
    }

    .input-row {
        display: flex;
        gap: 0.75rem;
    }

    .minute-input {
        width: 6rem;
        padding: 0.5rem 1rem;
        border: 1px solid var(--color-gray-200);
        border-radius: 0.75rem;
        text-align: center;
        font-size: 1rem;
        outline: none;
        transition: all 0.2s;
    }

    .minute-input:focus {
        border-color: transparent;
        box-shadow: 0 0 0 2px var(--color-amber-500);
    }

    .btn-add {
        padding: 0.5rem 1.5rem;
        background: var(--color-gray-900);
        color: white;
        border: none;
        border-radius: 0.75rem;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s;
    }

    .btn-add:hover {
        background: var(--color-gray-800);
    }

    .btn-add:active {
        transform: scale(0.95);
    }

    .hour-row {
        display: flex;
        align-items: center;
        gap: 0.75rem;
    }

    .hour-select {
        padding: 0.5rem 1rem;
        border: 1px solid var(--color-gray-200);
        border-radius: 0.75rem;
        outline: none;
        background: white;
        cursor: pointer;
        font-size: 1rem;
        transition: all 0.2s;
        -webkit-appearance: none;
        appearance: none;
    }

    .hour-select:focus {
        border-color: transparent;
        box-shadow: 0 0 0 2px var(--color-amber-500);
    }

    .hour-arrow {
        color: var(--color-gray-400);
    }

    .modal-footer {
        display: flex;
        gap: 0.75rem;
        justify-content: flex-end;
        padding-top: 1rem;
        border-top: 1px solid var(--color-gray-100);
    }

    .btn-reset {
        padding: 0.625rem 1.25rem;
        color: var(--color-gray-600);
        border-radius: 0.75rem;
        font-weight: 500;
        background: transparent;
        border: none;
        cursor: pointer;
        transition: background-color 0.2s;
    }

    .btn-reset:hover {
        background: var(--color-gray-100);
    }

    .btn-close {
        padding: 0.625rem 1.5rem;
        background: var(--color-amber-500);
        color: white;
        border: none;
        border-radius: 0.75rem;
        font-weight: 500;
        cursor: pointer;
        box-shadow: 0 10px 15px -3px rgba(245, 158, 11, 0.25);
        transition: all 0.2s;
    }

    .btn-close:hover {
        background: var(--color-amber-600);
    }

    .btn-close:active {
        transform: scale(0.95);
    }
</style>
