var audio = null;

function initAudio() {
    if (audio) return;
    audio = new Audio("data:audio/mp3;base64," + CHIME_BASE64);
    audio.volume = 1;
    var playPromise = audio.play();
    if (playPromise !== undefined) {
        playPromise.then(function() {
            audio.pause();
        }).catch(function() {});
    }
}

function checkAndPlayChime() {
    var now = new Date();
    var hours = now.getHours();
    var minutes = now.getMinutes();
    var seconds = now.getSeconds();

    if (
        settings.minutes.indexOf(minutes) !== -1 &&
        hours >= settings.startHour &&
        hours <= settings.endHour &&
        seconds === 0
    ) {
        if (audio) audio.play();
    }
}
